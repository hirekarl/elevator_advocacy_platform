services:
  # 1. Django API
  - type: web
    name: elevator-advocacy-api
    env: python
    buildCommand: "./render_build.sh"
    startCommand: "gunicorn --chdir backend config.wsgi"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: elevator-db
          property: connectionString
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_ALLOWED_HOSTS
        value: "*" # Update after first deploy with actual domain

  # 2. Django Task Worker
  - type: worker
    name: elevator-advocacy-worker
    env: python
    buildCommand: "./render_build.sh"
    startCommand: "python backend/manage.py runworker"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: elevator-db
          property: connectionString
      - key: DJANGO_DEBUG
        value: "False"

  # 3. React Frontend
  - type: web
    name: elevator-advocacy-frontend
    env: static
    buildCommand: "cd frontend && npm install && npm run build"
    staticPublishPath: "frontend/dist"
    envVars:
      - key: VITE_API_URL
        value: "https://elevator-advocacy-api.onrender.com"

databases:
  - name: elevator-db
    plan: free
