services:
  # 1. Django API
  - type: web
    name: elevator-advocate-api
    env: python
    buildCommand: "./render_build.sh"
    startCommand: "backend/.venv/bin/gunicorn --chdir backend config.wsgi"
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
      - key: DATABASE_URL
        fromDatabase:
          name: elevator-advocate-db
          property: connectionString
      - key: DJANGO_DEBUG
        value: "False"
      - key: CORS_ALLOWED_ORIGINS
        value: "http://localhost:5173,https://elevator-advocate-frontend.onrender.com,https://elevatoradvocate.nyc,https://www.elevatoradvocate.nyc"
      - key: CSRF_TRUSTED_ORIGINS
        value: "http://localhost:5173,https://elevator-advocate-frontend.onrender.com,https://elevatoradvocate.nyc,https://www.elevatoradvocate.nyc"

      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_ALLOWED_HOSTS
        value: "elevator-advocate-api.onrender.com,api.elevatoradvocate.nyc,localhost,127.0.0.1"
      - key: SEED_ADMIN_USERNAME
        value: "admin"
      - key: SEED_ADMIN_EMAIL
        value: "admin@elevatoradvocate.nyc"
      - key: SEED_ADMIN_PASSWORD
        sync: false
      - key: SEED_USER_PASSWORD
        sync: false
      - key: DJANGO_TIME_ZONE
        value: "America/New_York"
      - key: NYC_API_KEY
        sync: false
      - key: SODA_APP_TOKEN
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: SERPAPI_KEY
        sync: false
      - key: USE_MOCK_GEOCLIENT
        value: "False"
      - key: USE_MOCK_SERPAPI
        value: "False"

  # 2. React Frontend
  - type: web
    name: elevator-advocate-frontend
    env: static
    buildCommand: "cd frontend && npm install && npm run build"
    staticPublishPath: "frontend/dist"
    envVars:
      - key: VITE_API_URL
        value: "https://api.elevatoradvocate.nyc"


databases:
  - name: elevator-advocate-db
    plan: basic-256mb
